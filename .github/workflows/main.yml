name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: remotion-iamazing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: mkdir -p out
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: video-mp4
          path: remotion-iamazing/out/iamazing-school.mp4
