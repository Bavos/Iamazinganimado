name: Render Remotion Video

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          

      - run: npm ci

      - run: mkdir -p out

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: iamazing-school-video
          path: out/iamazing-school.mp4
