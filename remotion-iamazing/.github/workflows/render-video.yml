name: Render Remotion Video

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          

      - name: Install dependencies
        working-directory: remotion-iamazing
        run: npm install

      - name: Render video
        working-directory: remotion-iamazing
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iamazing-school-mp4
          path: remotion-iamazing/out/iamazing-school.mp4
